<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igisoro Live & Betting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        .pit-shadow { box-shadow: inset 0 4px 6px -1px rgba(0, 0, 0, 0.6), inset 0 2px 4px -1px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-start pt-24 pb-12 font-sans relative p-4">

    <!-- TOP BAR -->
    <div class="absolute top-4 right-4 flex items-center gap-4 bg-slate-800 px-4 py-2 rounded-lg border border-slate-700 z-10">
        <div class="text-right">
            <span class="text-xs text-slate-400 block">Wallet Balance</span>
            <span class="text-lg font-extrabold text-emerald-400" id="wallet-balance">Loading...</span>
        </div>
        <div class="flex gap-2">
            <button onclick="togglePopup('deposit-popup')" class="px-3 py-1 bg-emerald-600 hover:bg-emerald-500 rounded text-xs font-bold">Deposit</button>
        </div>
    </div>

    <!-- MAIN MENU -->
    <div id="main-menu" class="text-center space-y-6 max-w-lg p-6 bg-slate-800 rounded-xl border border-slate-700">
        <h1 class="text-4xl font-extrabold text-amber-500">IGISORO LIVE</h1>
        <div class="inline-flex items-center gap-2 px-3 py-1 bg-slate-900 rounded-full text-xs">
            <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-red-500"></span>
            <span id="status-text">Guhuza na server...</span>
        </div>
    </div>

    <!-- POPUPS -->
    <div id="deposit-popup" class="hidden fixed inset-0 bg-black/75 flex items-center justify-center p-4 z-50">
        <div class="bg-slate-800 rounded-xl p-6 w-full max-w-sm relative">
            <button onclick="togglePopup('deposit-popup')" class="absolute top-3 right-3 text-xl">&times;</button>
            <h3 class="text-xl font-bold text-emerald-400 mb-4">Deposit</h3>
            <input type="text" id="dep-phone" placeholder="0788xxxxxx" class="w-full bg-slate-900 border border-slate-700 p-2 mb-2">
            <input type="number" id="dep-amount" placeholder="Amount (RWF)" class="w-full bg-slate-900 border border-slate-700 p-2 mb-4">
            <button onclick="submitDeposit()" class="w-full py-2 bg-emerald-600 rounded font-bold">Emeza</button>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://baza-migambi-backend.onrender.com";
        const socket = io(BACKEND_URL, { transports: ['websocket'], secure: true });
        let currentUser = null;

        socket.on('connect', () => {
            document.getElementById('status-dot').classList.replace('bg-red-500', 'bg-emerald-500');
            document.getElementById('status-text').textContent = "Uhuje!";
            initializeUser();
        });

        async function initializeUser() {
            try {
                // Tugeza amasegonda make niba ID idahise iboneka
                const savedId = localStorage.getItem('igisoro_user_id') || null;
                const response = await fetch(`${BACKEND_URL}/api/user/get-or-create`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: savedId })
                });
                const data = await response.json();
                if (data.success) {
                    currentUser = data.user;
                    localStorage.setItem('igisoro_user_id', currentUser.id);
                    document.getElementById('wallet-balance').textContent = `${Number(currentUser.wallet_balance).toLocaleString()} RWF`;
                }
            } catch (err) { 
                console.error("Init Error:", err);
                setTimeout(initializeUser, 3000); // Ongera ugerageze nyuma y'amasegonda 3
            }
        }

        async function submitDeposit() {
            if (!currentUser) {
                alert("Umwirondoro ukiri gupakira, tegereza gato!");
                return;
            }
            const phone = document.getElementById('dep-phone').value;
            const amount = document.getElementById('dep-amount').value;
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/wallet/deposit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUser.id, phone, amount: Number(amount) })
                });
                const data = await response.json();
                if (data.success) {
                    alert("Byakunze!");
                    location.reload();
                } else {
                    alert("Byanze: " + data.message);
                }
            } catch (err) { alert("Server ntiri gusubiza!"); }
        }

        function togglePopup(id) { document.getElementById(id).classList.toggle('hidden'); }
    </script>
</body>
</html>
