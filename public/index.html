<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igisoro Live & Betting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .pit-shadow { box-shadow: inset 0 4px 6px -1px rgba(0, 0, 0, 0.6), inset 0 2px 4px -1px rgba(0, 0, 0, 0.5); }
        .active-sowing { background-color: #78350f !important; box-shadow: 0 0 12px #f59e0b; transform: scale(1.1); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-start pt-24 pb-12 font-sans relative p-4">

    <!-- TOP BAR -->
    <div class="absolute top-4 right-4 flex items-center gap-4 bg-slate-800 px-4 py-2 rounded-lg border border-slate-700 z-10">
        <div class="text-right">
            <span class="text-xs text-slate-400 block">Wallet Balance</span>
            <span class="text-lg font-extrabold text-emerald-400" id="wallet-balance">0 RWF</span>
        </div>
        <div class="flex gap-2">
            <button onclick="togglePopup('deposit-popup')" class="px-3 py-1 bg-emerald-600 hover:bg-emerald-500 rounded text-xs font-bold transition-colors">Deposit</button>
            <button onclick="togglePopup('withdraw-popup')" class="px-3 py-1 bg-red-600 hover:bg-red-500 rounded text-xs font-bold transition-colors">Withdraw</button>
        </div>
    </div>

    <!-- MAIN CARD -->
    <div id="main-menu" class="text-center space-y-6 max-w-lg p-6 bg-slate-800 rounded-xl shadow-2xl border border-slate-700">
        <h1 class="text-4xl font-extrabold text-amber-500 tracking-wider">IGISORO LIVE</h1>
        <p class="text-slate-400">Karibu! Kina n'inshuti zawe Live cyangwa na Computer ubashe gutsindira amafaranga macye.</p>
        <div class="inline-flex items-center gap-2 px-3 py-1 bg-slate-900 rounded-full text-xs">
            <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-red-500"></span>
            <span id="status-text">Guhuza na server...</span>
        </div>
        <div class="grid grid-cols-2 gap-4 pt-4">
            <button onclick="fataUrurimi('computer')" class="py-3 px-6 bg-amber-600 hover:bg-amber-500 rounded-lg font-bold transition-all transform hover:scale-105 shadow-lg">🎮 Vs Computer</button>
            <button onclick="startOnlineQueue()" class="py-3 px-6 bg-emerald-600 hover:bg-emerald-500 rounded-lg font-bold transition-all transform hover:scale-105 shadow-lg">👥 Kina Online (Live)</button>
        </div>
    </div>

    <!-- POPUPS -->
    <div id="deposit-popup" class="hidden fixed inset-0 bg-black/75 flex items-center justify-center p-4 z-50">
        <div class="bg-slate-800 rounded-xl border border-slate-700 p-6 w-full max-w-sm relative">
            <button onclick="togglePopup('deposit-popup')" class="absolute top-3 right-3 text-slate-400 hover:text-white text-xl">&times;</button>
            <h3 class="text-xl font-bold text-emerald-400 mb-4">Gushyiraho Amafaranga (Deposit)</h3>
            <div class="space-y-4">
                <input type="text" id="dep-phone" placeholder="Nimero ya MoMo (0788xxxxxx)" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2">
                <input type="number" id="dep-amount" placeholder="Umubare (RWF)" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2">
                <button onclick="submitDeposit()" class="w-full py-2 bg-emerald-600 hover:bg-emerald-500 rounded font-bold">Emeza (Deposit)</button>
            </div>
        </div>
    </div>

    <div id="withdraw-popup" class="hidden fixed inset-0 bg-black/75 flex items-center justify-center p-4 z-50">
        <div class="bg-slate-800 rounded-xl border border-slate-700 p-6 w-full max-w-sm relative">
            <button onclick="togglePopup('withdraw-popup')" class="absolute top-3 right-3 text-slate-400 hover:text-white text-xl">&times;</button>
            <h3 class="text-xl font-bold text-red-400 mb-4">Kubikuza (Withdraw)</h3>
            <div class="space-y-4">
                <input type="text" id="with-phone" placeholder="Nimero ya MoMo" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2">
                <input type="number" id="with-amount" placeholder="Umubare (RWF)" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2">
                <button onclick="submitWithdraw()" class="w-full py-2 bg-red-600 hover:bg-red-500 rounded font-bold">Emeza (Withdraw)</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentUser = null;

        async function initializeUser() {
            try {
                const response = await fetch('/api/user/get-or-create', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: localStorage.getItem('igisoro_user_id') })
                });
                const data = await response.json();
                if (data.success) {
                    currentUser = data.user;
                    localStorage.setItem('igisoro_user_id', currentUser.id);
                    document.getElementById('wallet-balance').textContent = `${Number(currentUser.wallet_balance).toLocaleString()} RWF`;
                }
            } catch (err) { console.error("Init Error:", err); }
        }

        socket.on('connect', () => { initializeUser(); });

        async function submitDeposit() {
            const phone = document.getElementById('dep-phone').value;
            const amount = document.getElementById('dep-amount').value;
            if(!currentUser) return alert('Banza winjire neza!');
            
            try {
                const response = await fetch(window.location.origin + '/api/wallet/deposit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUser.id, phone, amount: Number(amount) })
                });
                const data = await response.json();
                if (data.success) {
                    alert(`🎉 ${data.message}`);
                    document.getElementById('wallet-balance').textContent = `${Number(data.balance).toLocaleString()} RWF`;
                    togglePopup('deposit-popup');
                } else {
                    alert("Icyo byapfuyeho: " + data.message);
                }
            } catch (err) { 
                console.error("Deposit Err:", err);
                alert("Server ntiri gusubiza!"); 
            }
        }

        async function submitWithdraw() {
            const phone = document.getElementById('with-phone').value;
            const amount = document.getElementById('with-amount').value;
            try {
                const response = await fetch(window.location.origin + '/api/wallet/withdraw', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUser.id, phone, amount: Number(amount) })
                });
                const data = await response.json();
                if (data.success) {
                    alert(`💸 ${data.message}`);
                    document.getElementById('wallet-balance').textContent = `${Number(data.balance).toLocaleString()} RWF`;
                    togglePopup('withdraw-popup');
                } else {
                    alert("Icyo byapfuyeho: " + data.message);
                }
            } catch (err) { alert("Server ntiri gusubiza!"); }
        }

        function togglePopup(id) { document.getElementById(id).classList.toggle('hidden'); }
    </script>
</body>
</html>
